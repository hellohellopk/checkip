<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Inter',-apple-system,sans-serif; background:#F2F2F7; color:#1C1C1E; min-height:100vh; }
        .app { max-width:480px; margin:0 auto; padding:12px 12px 80px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; padding:10px 0 14px; }
        .top-bar-title { font-size:20px; font-weight:700; }
        .api-pill { padding:5px 10px; background:#FFF; border:1px solid #E5E5EA; border-radius:16px; font-size:10px; color:#636366; cursor:pointer; font-family:'Inter',sans-serif; }

        .update-text { font-size:10px; color:#8E8E93; text-align:center; padding:2px 0 12px; }

        .base-card { background:#FFF; border:2px solid #007AFF; border-radius:14px; padding:12px 14px; display:flex; align-items:center; margin-bottom:6px; box-shadow:0 2px 10px rgba(0,122,255,0.10); }

        .base-currency-btn { display:flex; align-items:center; gap:4px; background:transparent; border:none; cursor:pointer; padding:2px 6px 2px 0; border-radius:8px; transition:background 0.15s; }
        .base-currency-btn:hover { background:#F2F2F7; }
        .base-currency-btn .code { font-size:16px; font-weight:600; color:#1C1C1E; }
        .base-currency-btn .chevron { font-size:11px; color:#8E8E93; }

        .currency-card { background:#FFF; border:1px solid #E5E5EA; border-radius:14px; padding:10px 14px; display:flex; align-items:center; margin-bottom:6px; position:relative; transition:background 0.15s; }
        .currency-card:active { background:#F2F2F7; }
        .currency-card.unsupported { opacity:0.45; }

        .delete-btn { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:22px; height:22px; background:#FF3B30; border-radius:50%; border:none; color:#FFF; font-size:15px; line-height:22px; text-align:center; cursor:pointer; display:none; font-weight:700; z-index:2; }
        .currency-card.editing { padding-left:42px; }
        .currency-card.editing .delete-btn { display:block; }

        .flag-wrap { width:34px; height:34px; border-radius:50%; overflow:hidden; flex-shrink:0; margin-right:10px; border:1px solid #E5E5EA; background:#F2F2F7; }
        .flag-wrap img { width:100%; height:100%; object-fit:cover; }
        .flag-wrap.base { width:38px; height:38px; }

        .currency-code { font-size:15px; font-weight:600; color:#1C1C1E; }
        .currency-rate { font-size:10px; color:#8E8E93; margin-top:1px; }

        .amount-section { margin-left:auto; display:flex; align-items:center; gap:6px; }
        .amount-input { font-size:18px; font-weight:700; color:#1C1C1E; text-align:right; border:none; outline:none; background:transparent; font-family:'Inter',sans-serif; width:150px; max-width:52vw; }
        .amount-input.base { font-size:20px; width:160px; }
        .na-label { font-size:13px; color:#C7C7CC; font-style:italic; margin-left:auto; }

        .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(242,242,247,0.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); padding:10px 16px 24px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid #E5E5EA; }
        .add-btn { background:transparent; border:none; font-size:15px; font-weight:500; color:#007AFF; cursor:pointer; font-family:'Inter',sans-serif; }
        .add-btn:disabled { opacity:0.4; cursor:not-allowed; }
        .bottom-right { display:flex; align-items:center; gap:10px; }
        .mid-text { font-size:12px; color:#8E8E93; }
        .edit-btn { background:transparent; border:none; font-size:14px; font-weight:500; color:#007AFF; cursor:pointer; font-family:'Inter',sans-serif; }
        .edit-btn.editing { color:#FF3B30; }

        .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(28,28,30,0.85); color:#FFF; padding:7px 18px; border-radius:18px; font-size:12px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
        .toast.show { opacity:1; }

        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:300; align-items:flex-end; justify-content:center; }
        .modal.active { display:flex; }
        .modal-sheet { background:#FFF; border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:80vh; overflow:hidden; display:flex; flex-direction:column; }
        .modal-header { padding:14px 18px 10px; border-bottom:1px solid #E5E5EA; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .modal-title { font-size:16px; font-weight:600; }
        .modal-cancel { background:none; border:none; font-size:15px; color:#007AFF; cursor:pointer; font-family:'Inter',sans-serif; }
        .search-wrap { padding:10px 14px; flex-shrink:0; border-bottom:1px solid #E5E5EA; }
        .search-input { width:100%; padding:8px 12px; background:#F2F2F7; border:none; border-radius:10px; font-size:14px; font-family:'Inter',sans-serif; outline:none; }
        .list-scroll { overflow-y:auto; flex:1; }
        .opt { padding:11px 14px; border-bottom:1px solid #F2F2F7; cursor:pointer; display:flex; align-items:center; gap:10px; }
        .opt:hover { background:#F2F2F7; }
        .opt img { width:32px; height:32px; border-radius:50%; border:1px solid #E5E5EA; flex-shrink:0; }
        .opt-code { font-size:14px; font-weight:600; }
        .opt-name { font-size:11px; color:#8E8E93; margin-top:1px; }
        .no-results { padding:36px 20px; text-align:center; color:#8E8E93; font-size:13px; }
        .opt .check { margin-left:auto; color:#007AFF; font-size:16px; display:none; }
        .opt.selected .check { display:block; }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <div class="top-bar-title">FX</div>
        <select class="api-pill" id="api-selector">
            <option value="exchangeratefree">ExchangeRate-API (Free)</option>
            <option value="fxratesapi">FXRatesAPI</option>
            <option value="exchangerate">ExchangeRate-API</option>
            <option value="openexchange">Open Exchange Rates</option>
        </select>
    </div>

    <div class="update-text" id="update-time">Loading...</div>

    <div class="base-card">
        <div class="flag-wrap base">
            <img src="" alt="" id="base-flag-img" />
        </div>
        <button class="base-currency-btn" id="base-currency-btn">
            <span class="code" id="base-code">HKD</span>
            <span class="chevron">▾</span>
        </button>
        <div class="amount-section">
            <input type="text" class="amount-input base" id="base-input"
                   value="HK$ 1,000.00" data-code="HKD" data-symbol="HK$" inputmode="decimal" />
        </div>
    </div>

    <div id="currency-list"></div>
</div>

<div class="bottom-bar">
    <button class="add-btn" id="add-btn" disabled>＋ Add currency</button>
    <div class="bottom-right">
        <span class="mid-text">Mid-market</span>
        <button class="edit-btn" id="edit-btn">Edit</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="add-modal">
    <div class="modal-sheet">
        <div class="modal-header">
            <span class="modal-title">Add Currency</span>
            <button class="modal-cancel" id="add-modal-cancel">Cancel</button>
        </div>
        <div class="search-wrap">
            <input type="text" class="search-input" id="add-search" placeholder="Search…" />
        </div>
        <div class="list-scroll" id="add-options"></div>
    </div>
</div>

<div class="modal" id="base-modal">
    <div class="modal-sheet">
        <div class="modal-header">
            <span class="modal-title">Base Currency</span>
            <button class="modal-cancel" id="base-modal-cancel">Cancel</button>
        </div>
        <div class="search-wrap">
            <input type="text" class="search-input" id="base-search" placeholder="Search…" />
        </div>
        <div class="list-scroll" id="base-options"></div>
    </div>
</div>

<script>
    const OXR_APP_ID = '219fb31cd84b49acb19edb3cb5e7cdfd';

    const API_CONFIGS = {
        exchangeratefree: {
            name: 'ExchangeRate-API (Free)',
            url:  'https://api.exchangerate-api.com/v4/latest/USD',
            parse: d => ({ rates: d.rates, ts: d.time_last_updated || Math.floor(Date.now()/1000) })
        },
        fxratesapi: {
            name: 'FXRatesAPI',
            url:  'https://api.fxratesapi.com/latest?base=USD',
            parse: d => ({ rates: d.rates, ts: d.timestamp || Math.floor(Date.now()/1000) })
        },
        exchangerate: {
            name: 'ExchangeRate-API',
            url:  'https://open.er-api.com/v6/latest/USD',
            parse: d => ({ rates: d.rates, ts: d.time_last_update_unix || Math.floor(Date.now()/1000) })
        },
        openexchange: {
            name: 'Open Exchange Rates',
            url:  `https://openexchangerates.org/api/latest.json?app_id=${OXR_APP_ID}&base=USD`,
            parse: d => ({ rates: d.rates, ts: d.timestamp || Math.floor(Date.now()/1000) })
        }
    };

    const ALL = {
        HKD:{name:'Hong Kong Dollar',   flag:'hk', sym:'HK$'},
        USD:{name:'US Dollar',          flag:'us', sym:'$'},
        JPY:{name:'Japanese Yen',       flag:'jp', sym:'¥'},
        EUR:{name:'Euro',               flag:'eu', sym:'€'},
        GBP:{name:'British Pound',      flag:'gb', sym:'£'},
        CNY:{name:'Chinese Yuan',       flag:'cn', sym:'¥'},
        TWD:{name:'Taiwan Dollar',      flag:'tw', sym:'NT$'},
        KRW:{name:'Korean Won',         flag:'kr', sym:'₩'},
        SGD:{name:'Singapore Dollar',   flag:'sg', sym:'S$'},
        AUD:{name:'Australian Dollar',  flag:'au', sym:'A$'},
        CAD:{name:'Canadian Dollar',    flag:'ca', sym:'C$'},
        CHF:{name:'Swiss Franc',        flag:'ch', sym:'CHF'},
        MYR:{name:'Malaysian Ringgit',  flag:'my', sym:'RM'},
        THB:{name:'Thai Baht',          flag:'th', sym:'฿'},
        INR:{name:'Indian Rupee',       flag:'in', sym:'₹'},
        IDR:{name:'Indonesian Rupiah',  flag:'id', sym:'Rp'},
        PHP:{name:'Philippine Peso',    flag:'ph', sym:'₱'},
        VND:{name:'Vietnamese Dong',    flag:'vn', sym:'₫'},
        MXN:{name:'Mexican Peso',       flag:'mx', sym:'MX$'},
        BRL:{name:'Brazilian Real',     flag:'br', sym:'R$'},
        ZAR:{name:'South African Rand', flag:'za', sym:'R'},
        SEK:{name:'Swedish Krona',      flag:'se', sym:'kr'},
        NOK:{name:'Norwegian Krone',    flag:'no', sym:'kr'},
        NZD:{name:'New Zealand Dollar', flag:'nz', sym:'NZ$'},
        RUB:{name:'Russian Ruble',      flag:'ru', sym:'₽'},
        TRY:{name:'Turkish Lira',       flag:'tr', sym:'₺'},
        NGN:{name:'Nigerian Naira',     flag:'ng', sym:'₦'},
    };

    let rates=null, displayed=[], amounts={}, editMode=false, updating=false, base='HKD';

    function save() {
        localStorage.setItem('fx_v4', JSON.stringify({
            displayed, amounts,
            api: document.getElementById('api-selector').value,
            base
        }));
        showToast('✓ Saved');
    }

    function load() {
        try {
            const s = JSON.parse(localStorage.getItem('fx_v4'));
            if (!s) return false;
            displayed = s.displayed || [];
            amounts   = s.amounts   || {};
            base      = s.base      || 'HKD';
            if (s.api) document.getElementById('api-selector').value = s.api;
            return true;
        } catch(e) { return false; }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1800);
    }

    function fmt(n, d=2) {
        const p = n.toFixed(d).split('.');
        p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return p.join('.');
    }

    function fmtRate(r) {
        if (r >= 100) return r.toFixed(2);
        if (r >= 1)   return r.toFixed(4);
        return r.toFixed(6);
    }

    function isSupported(code) {
        return rates && rates[code] !== undefined;
    }

    async function fetchRates() {
        const api = document.getElementById('api-selector').value;
        const cfg = API_CONFIGS[api];
        document.getElementById('update-time').textContent = 'Loading...';
        try {
            const res  = await fetch(cfg.url);
            const data = await res.json();
            if (data.error) throw new Error(data.description || data.error);
            const { rates: raw, ts } = cfg.parse(data);
            const hkd = raw['HKD'];
            if (!hkd) throw new Error('HKD not found');
            rates = {};
            for (const c in raw) rates[c] = raw[c] / hkd;
            rates['HKD'] = 1;
            const t = new Date(ts * 1000);
            document.getElementById('update-time').textContent =
                `${cfg.name} · ${t.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false})}`;
            document.getElementById('add-btn').disabled = false;
            return true;
        } catch(e) {
            document.getElementById('update-time').textContent = `${cfg.name} · Error: ${e.message}`;
            document.getElementById('add-btn').disabled = true;
            return false;
        }
    }

    function renderBase() {
        const info = ALL[base];
        document.getElementById('base-code').textContent = base;
        document.getElementById('base-flag-img').src = `https://flagcdn.com/w80/${info.flag}.png`;
        const inp = document.getElementById('base-input');
        inp.dataset.code   = base;
        inp.dataset.symbol = info.sym;
        inp.value = `${info.sym} ${fmt(amounts[base] || 1000)}`;
    }

    function recalcFromBase(amt) {
        if (!rates) return;
        updating = true;
        amounts[base] = amt;
        const inHKD = amt / rates[base];
        displayed.forEach(c => {
            if (!isSupported(c)) return;
            const a = inHKD * rates[c]; amounts[c] = a;
            const inp = document.getElementById(`inp-${c}`);
            if (inp) inp.value = `${ALL[c].sym} ${fmt(a)}`;
            const rel = document.getElementById(`rate-${c}`);
            if (rel) rel.textContent = `1 ${base} = ${fmtRate(rates[c]/rates[base])} ${c}`;
        });
        updating = false;
    }

    function recalcFromCard(code, amt) {
        if (updating || !rates) return;
        updating = true;
        amounts[code] = amt;
        const inHKD = amt / rates[code];
        amounts[base] = inHKD * rates[base];
        document.getElementById('base-input').value = `${ALL[base].sym} ${fmt(amounts[base])}`;
        displayed.forEach(c => {
            if (c === code || !isSupported(c)) return;
            const a = inHKD * rates[c]; amounts[c] = a;
            const inp = document.getElementById(`inp-${c}`);
            if (inp) inp.value = `${ALL[c].sym} ${fmt(a)}`;
        });
        updating = false;
    }

    function renderList() {
        const list = document.getElementById('currency-list');
        list.innerHTML = '';
        if (displayed.length === 0) {
            list.innerHTML = `<div style="text-align:center;padding:40px 0;color:#8E8E93;font-size:13px;">Tap "+ Add currency" to start</div>`;
            return;
        }
        displayed.forEach(code => {
            const info = ALL[code]; if (!info) return;
            const supported = isSupported(code);
            const amt = amounts[code] || (supported ? 1000 * rates[code] : 0);
            const card = document.createElement('div');
            card.className = 'currency-card' + (editMode ? ' editing' : '') + (supported ? '' : ' unsupported');

            const amountHTML = supported
                ? `<input type="text" id="inp-${code}" class="amount-input"
                       value="${info.sym} ${fmt(amt)}"
                       data-code="${code}" data-symbol="${info.sym}" inputmode="decimal"/>`
                : `<span class="na-label">Not available</span>`;

            card.innerHTML = `
                ${editMode ? `<button class="delete-btn" data-code="${code}">×</button>` : ''}
                <div class="flag-wrap"><img src="https://flagcdn.com/w80/${info.flag}.png" alt="${code}"/></div>
                <div style="margin-right:10px;min-width:0;">
                    <div class="currency-code">${code}</div>
                    <div class="currency-rate" id="rate-${code}">${supported
                        ? `1 ${base} = ${fmtRate(rates[code]/rates[base])} ${code}`
                        : 'Not supported by this API'}</div>
                </div>
                <div class="amount-section">${amountHTML}</div>
            `;
            list.appendChild(card);

            const del = card.querySelector('.delete-btn');
            if (del) del.addEventListener('click', e => {
                e.stopPropagation();
                displayed = displayed.filter(c => c !== code);
                delete amounts[code];
                save(); renderList();
            });

            if (supported) {
                const inp = document.getElementById(`inp-${code}`);
                inp.addEventListener('focus', function() {
                    this.value = this.value.replace(this.dataset.symbol,'').replace(/,/g,'').trim();
                });
                inp.addEventListener('blur', function() {
                    let v = parseFloat(this.value.replace(/[^0-9.-]/g,''));
                    if (isNaN(v)) v = 0;
                    this.value = `${this.dataset.symbol} ${fmt(v)}`;
                    save();
                });
                inp.addEventListener('input', function() {
                    const v = parseFloat(this.value.replace(/[^0-9.-]/g,''));
                    if (!isNaN(v) && v >= 0) recalcFromCard(this.dataset.code, v);
                });
            }
        });
    }

    const bInp = document.getElementById('base-input');
    bInp.addEventListener('focus', function() {
        this.value = this.value.replace(this.dataset.symbol,'').replace(/,/g,'').trim();
    });
    bInp.addEventListener('blur', function() {
        let v = parseFloat(this.value.replace(/[^0-9.-]/g,''));
        if (isNaN(v)) v = 1000;
        this.value = `${this.dataset.symbol} ${fmt(v)}`;
        save();
    });
    bInp.addEventListener('input', function() {
        const v = parseFloat(this.value.replace(/[^0-9.-]/g,''));
        if (!isNaN(v) && v >= 0) recalcFromBase(v);
    });

    function buildBaseModal(q='') {
        const con = document.getElementById('base-options');
        con.innerHTML = '';
        const kw = q.toLowerCase();
        Object.keys(ALL)
            .filter(c => isSupported(c) && (c.toLowerCase().includes(kw) || ALL[c].name.toLowerCase().includes(kw)))
            .forEach(code => {
                const info = ALL[code];
                const el = document.createElement('div');
                el.className = 'opt' + (code === base ? ' selected' : '');
                el.innerHTML = `
                    <img src="https://flagcdn.com/w80/${info.flag}.png" alt="${code}"/>
                    <div><div class="opt-code">${code}</div><div class="opt-name">${info.name}</div></div>
                    <span class="check">✓</span>
                `;
                el.addEventListener('click', () => {
                    const oldBase = base; base = code;
                    if (rates && amounts[oldBase]) {
                        const inHKD = (amounts[oldBase]||1000) / rates[oldBase];
                        amounts[base] = inHKD * rates[base];
                    }
                    document.getElementById('base-modal').classList.remove('active');
                    document.getElementById('base-search').value = '';
                    renderBase(); recalcFromBase(amounts[base]||1000); renderList(); save();
                });
                con.appendChild(el);
            });
        if (!con.children.length) con.innerHTML = `<div class="no-results">No currencies found</div>`;
    }

    document.getElementById('base-currency-btn').addEventListener('click', () => {
        buildBaseModal();
        document.getElementById('base-modal').classList.add('active');
        setTimeout(() => document.getElementById('base-search').focus(), 150);
    });
    document.getElementById('base-modal-cancel').addEventListener('click', () => {
        document.getElementById('base-modal').classList.remove('active');
        document.getElementById('base-search').value = '';
    });
    document.getElementById('base-search').addEventListener('input', function() { buildBaseModal(this.value); });

    function buildAddModal(q='') {
        const con = document.getElementById('add-options');
        con.innerHTML = '';
        const kw = q.toLowerCase();
        const avail = Object.keys(ALL).filter(c =>
            c !== base && !displayed.includes(c) &&
            (c.toLowerCase().includes(kw) || ALL[c].name.toLowerCase().includes(kw))
        );
        if (!avail.length) { con.innerHTML = `<div class="no-results">No currencies found</div>`; return; }
        avail.forEach(code => {
            const info = ALL[code];
            const supported = isSupported(code);
            const el = document.createElement('div');
            el.className = 'opt';
            el.style.opacity = supported ? '1' : '0.45';
            el.innerHTML = `
                <img src="https://flagcdn.com/w80/${info.flag}.png" alt="${code}"/>
                <div>
                    <div class="opt-code">${code}</div>
                    <div class="opt-name">${info.name}${!supported ? ' · Not supported' : ''}</div>
                </div>
            `;
            el.addEventListener('click', () => {
                displayed.push(code);
                if (supported && Object.keys(amounts).length > 0) {
                    const inHKD = (amounts[base]||1000) / rates[base];
                    amounts[code] = inHKD * rates[code];
                }
                document.getElementById('add-modal').classList.remove('active');
                document.getElementById('add-search').value = '';
                save(); renderList();
            });
            con.appendChild(el);
        });
    }

    document.getElementById('add-btn').addEventListener('click', () => {
        buildAddModal();
        document.getElementById('add-modal').classList.add('active');
        setTimeout(() => document.getElementById('add-search').focus(), 150);
    });
    document.getElementById('add-modal-cancel').addEventListener('click', () => {
        document.getElementById('add-modal').classList.remove('active');
        document.getElementById('add-search').value = '';
    });
    document.getElementById('add-search').addEventListener('input', function() { buildAddModal(this.value); });

    document.getElementById('edit-btn').addEventListener('click', () => {
        editMode = !editMode;
        const btn = document.getElementById('edit-btn');
        btn.textContent = editMode ? 'Done' : 'Edit';
        btn.classList.toggle('editing', editMode);
        renderList();
    });

    document.getElementById('api-selector').addEventListener('change', async () => {
        const ok = await fetchRates();
        if (ok) { save(); recalcFromBase(amounts[base]||1000); renderList(); }
    });

    async function init() {
        load(); renderBase();
        const ok = await fetchRates();
        if (ok) { recalcFromBase(amounts[base]||1000); renderList(); }
    }

    init();
</script>
</body>
</html>
